meta:
  version: 3
  # Classic = macro hardening flow (no chip-level pad ring / sealring). This
  # hardens the MOSAIC SoC core (core_v_mini_mcu) by itself — useful for early
  # synthesis / PnR / area + timing exploration without the GF180 pad frame.
  # For the full chip (pad ring + sealring + chip streamout) use config.yaml
  # (meta.flow: Chip) with slots/slot_mosaic.yaml instead.
  flow: Classic
  substituting_steps:
    # Uncomment during development to skip slow signoff checks.
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null
    #Magic.DRC: null
    #Checker.MagicDRC: null
    #Netgen.LVS: null
    #Checker.LVS: null

DESIGN_NAME: core_v_mini_mcu

# Hash-checked flattened RTL supplied by the PHYSICAL_BUNDLE preflight.
VERILOG_FILES:
- $MOSAIC_FLATTENED_SOC_RTL

# x-heep is package-heavy SystemVerilog. Enable slang to feed Yosys the SV
# directly instead of pre-flattening with sv2v.
# USE_SLANG: True
# SLANG_ARGUMENTS: ['--keep-hierarchy']

PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# Clock — MOSAIC PoC closes STA at 50 MHz (20 ns) on the core clk_i pin.
CLOCK_PORT: clk_i
CLOCK_PERIOD: 20

PNR_SDC_FILE: dir::core_classic.sdc
SIGNOFF_SDC_FILE: dir::core_classic.sdc
FALLBACK_SDC: dir::core_classic.sdc

# Power / ground nets
VDD_NETS:
- VDD
GND_NETS:
- VSS

# Floorplan — let Librelane size the die from a target core utilization. Tune
# FP_CORE_UTIL / PL_TARGET_DENSITY_PCT once the placed area is known (the PoC
# target is ~1.249 mm²). Switch to FP_SIZING: absolute + DIE_AREA to pin a size.
FP_SIZING: relative
FP_CORE_UTIL: 40
PL_TARGET_DENSITY_PCT: 45
GRT_ALLOW_CONGESTION: true

# Hold-fix margins
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3

# Antenna repair after detailed routing
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10

# PDN — straps + a core ring for standalone hardening.
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75
PDN_CORE_RING: True
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_VERTICAL_LAYER: Metal2
PDN_CORE_HORIZONTAL_LAYER: Metal3

# Workshop deliverable posture — review before a real tapeout (CLAUDE.md
# mandates DRC/LVS-clean signoff). These suppress GF180 SRAM-macro false
# positives; the IO-cell waivers from the Chip flow are not needed here.
ERROR_ON_MAGIC_DRC: True
MAGIC_GDS_FLATGLOB:
- "*_CDNS_*"
- "*$$*"
- "M1_N*"
- "M1_P*"
- "M2_M1*"
- "M3_M2*"
- "nmos_5p0*"
- "nmos_1p2*"
- "pmos_5p0*"
- "pmos_1p2*"
- "via1_*"
- "ypass_gate*"
- "G_ring_*"
- "dcap_103*"
- "din_*"
- "mux821_*"
- "rdummy_*"
- "pmoscap_*"
- "xdec_*"
- "ypredec*"
- "xpredec*"
- "prexdec_*"
- "xdec8_*"
- "xdec16_*"
- "xdec32_*"
- "sa_*"

KLAYOUT_FILLER_OPTIONS:
  Metal2_ignore_active: true

# Hash-checked 32-KiB SRAM views from PHYSICAL_BUNDLE.
MACROS:
  mosaic_sram:
    gds: $MOSAIC_SRAM_GDS
    lef: $MOSAIC_SRAM_LEF
    lib: $MOSAIC_SRAM_LIB
    verilog: $MOSAIC_SRAM_VERILOG
    power_pin: VDD
    ground_pin: GND
    size: 1
    location: [100, 100]
    orientation: R0

PDN_MACRO_CONNECTIONS:
  - "mosaic_sram VDD $::env(VDD_NET)"
  - "mosaic_sram GND $::env(GND_NET)"

PDN_CFG: dir::pdn_cfg.tcl
