meta:
  version: 3
  flow: Chip
  substituting_steps:
    # Uncomment during development to skip slow signoff checks.
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null
    #Magic.DRC: null
    #Checker.MagicDRC: null
    #Netgen.LVS: null
    #Checker.LVS: null

DESIGN_NAME: mosaic_chip_top

# RTL inputs. The fail-closed preflight supplies both generated sources from a
# content-addressed PHYSICAL_BUNDLE. The checked-in adapter is a placeholder.
VERILOG_FILES:
- dir::src/chip_top.sv
- $MOSAIC_BOUND_SOC_RTL
- $MOSAIC_FLATTENED_SOC_RTL

# x-heep is package-heavy SystemVerilog. Slang gives Yosys proper SV support;
# this is the lower-friction alternative to the sv2v flatten step.
# USE_SLANG: True
# SLANG_ARGUMENTS: ['--keep-hierarchy']

PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# SDC
PNR_SDC_FILE: dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC: dir::chip_top.sdc

# Power / ground nets
VDD_NETS:
- VDD
GND_NETS:
- VSS

# bi_24t has an unused Y output on output-only pads.
IGNORE_DISCONNECTED_MODULES:
- gf180mcu_fd_io__bi_24t

# Clock — MOSAIC PoC closes STA at 50 MHz (20 ns). clk arrives on the clk pad.
CLOCK_PORT: clk_PAD
CLOCK_NET: clk_pad/Y
CLOCK_PERIOD: 20 # 50 MHz

# Hold-fix margins
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3

# Density/congestion — raise PL_TARGET_DENSITY_PCT once real area is known.
PL_TARGET_DENSITY_PCT: 45
GRT_ALLOW_CONGESTION: true

DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10

# PDN — straps
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75

# PDN — core ring (tie pad power into the grid)
PDN_CORE_RING: True
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: False
PDN_CORE_VERTICAL_LAYER: Metal2
PDN_CORE_HORIZONTAL_LAYER: Metal3

# Workshop deliverable posture — review before a real tapeout (CLAUDE.md
# mandates DRC/LVS-clean signoff). These suppress GF180 IO/SRAM false positives.
ERROR_ON_MAGIC_DRC: True
MAGIC_GDS_FLATGLOB:
- "*_CDNS_*"
- "*$$*"
- "M1_N*"
- "M1_P*"
- "M2_M1*"
- "M3_M2*"
- "nmos_5p0*"
- "nmos_1p2*"
- "pmos_5p0*"
- "pmos_1p2*"
- "via1_*"
- "ypass_gate*"
- "G_ring_*"
- "dcap_103*"
- "din_*"
- "mux821_*"
- "rdummy_*"
- "pmoscap_*"
- "xdec_*"
- "ypredec*"
- "xpredec*"
- "prexdec_*"
- "xdec8_*"
- "xdec16_*"
- "xdec32_*"
- "sa_*"

KLAYOUT_FILLER_OPTIONS:
  Metal2_ignore_active: true

# Multiple power pads per power domain.
MAGIC_EXT_UNIQUE: notopports

# The qualified physical target uses hash-checked 32-KiB GF180 SRAM views from
# PHYSICAL_BUNDLE. Other generator memory sizes are RTL/simulation-only.

MACROS:
  mosaic_sram:
    gds: $MOSAIC_SRAM_GDS
    lef: $MOSAIC_SRAM_LEF
    lib: $MOSAIC_SRAM_LIB
    verilog: $MOSAIC_SRAM_VERILOG
    power_pin: VDD
    ground_pin: GND
    size: 1
    location: [100, 100]
    orientation: R0

# SRAM power connections in PDN.
PDN_MACRO_CONNECTIONS:
  - "mosaic_sram VDD $::env(VDD_NET)"
  - "mosaic_sram GND $::env(GND_NET)"

FP_MACRO_HORIZONTAL_HALO: 10
FP_MACRO_VERTICAL_HALO: 10
PDN_HORIZONTAL_HALO: 5
PDN_VERTICAL_HALO: 5

PDN_CFG: dir::pdn_cfg.tcl
