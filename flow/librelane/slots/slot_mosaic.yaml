# MOSAIC-SoC floorplan + pad map (GF180MCU).
#
# Starting point: the wafer.space 1x1 MPW die envelope (3932 x 5122 um incl.
# 26 um sealring per side). Resize CORE_AREA once the placed SoC area is known
# (PoC target ~1.249 mm2). Pad instance names match the generate labels in
# src/chip_top.sv; lists are read CLOCKWISE FROM THE SW CORNER and regex-escaped.
#
# This is a balanced starting distribution of the 68 pads (clk + rst + 8 input
# + 50 bidir + 4 dvdd + 4 dvss). Refine the ORDER to match board/bonding needs
# and keep it consistent with the bit-index binding in src/mosaic_soc_core.sv.

FP_SIZING: absolute
DIE_AREA: [0, 0, 3932, 5122]
CORE_AREA: [442, 442, 3490, 4680]

VERILOG_DEFINES: ["SLOT_MOSAIC"]

