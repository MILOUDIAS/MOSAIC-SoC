# mosaic_boom.yaml — BOOM v3 (RV64 OoO, SIM-ONLY) bring-up config for the
# full-SoC TDU wake demo.
#
# Same 3-hart shape as mosaic_wake_demo.yaml (1 titan + 1 atlas@0x1000 +
# 1 nano@0x2000). BOTH workers are extracted chipyard SmallBoomV3 BoomTiles
# behind the TileLink→OBI window bridge (see mosaic_rocket.yaml for the
# window scheme). A superscalar out-of-order worker is deliberate overkill —
# this config exists to prove the SCI abstraction stretches that far.
#
# BOOM is EXCLUDED from the GF180MCU tapeout — simulation only.

soc:
  name: mosaic_boom
  pdk: gf180mcu
  profile: testbench

  cores:
    - ip: cv32e20         # TITAN — orchestrator; boots from the boot ROM (hart 0)
      isa: rv32emc
      count: 1
      role: titan

    - ip: boom            # ATLAS worker (hart 1) — dormant until TDU wake
      isa: rv64imc        # bridge does not implement A-extension transactions
      count: 1
      role: atlas
      boot_addr: 0x1000   # SRAM reset PC; tile boots at 0x8000_1000 (alias)

    - ip: boom            # NANO worker (hart 2) — dormant until TDU wake
      isa: rv64imc
      count: 1
      role: nano
      boot_addr: 0x2000   # SRAM reset PC; tile boots at 0x8000_2000 (alias)

  memory:
    sram_kb: 32
    boot_rom_kb: 2

  bus: obi

  scheduler:
    tdu: true
    mode: dynamic

  peripherals:
    - uart
    - gpio
    - timer
    - spi
